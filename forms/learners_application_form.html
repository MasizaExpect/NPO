<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masiza Expect Application Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }
        
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        
        h2 {
            color: #333;
        }
        
        label {
            display: block;
            margin: 10px 0 5px;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        button {
            background-color: #2599e6;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>

    <form action="submit_application.php" method="post">
        <h2>Masiza Expect Learners Application Form</h2>

        <!-- Personal Information -->
        <label for="firstname">Full Name:</label>
        <input type="text" id="firstname" name="firstname" required>

        <label for="lastname">Full Name:</label>
        <input type="text" id="lastname" name="lastname" required>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <!-- Contact Information -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required>

        <!-- Educational Information -->
        <label for="grade">Current Grade:</label>
        <input type="text" id="grade" name="grade" required>

        <label for="school">Current School:</label>
        <input type="text" id="school" name="school" required>

        <!-- Department Preference -->
        <label for="department">Preferred Department:</label>
        <select id="department" name="department" required>
            <option value="desat">Department of Education, Science, Agriculture, and Technology (DESAT)</option>
            <option value="dssace">Department of Social Development, Sports, Arts, Culture, and Event (DSSACE)</option>
        </select>

        <!-- Submit Button -->
        <button type="submit">Submit Application</button>
    </form>

</body>
</html>
