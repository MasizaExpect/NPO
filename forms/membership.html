<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Registration and Renewal</title>
    <style>
    
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h2{
            text-align: center;
        }
        form {
            max-width: 600px;
            margin: auto;
        }
        label {
            display: block;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        textarea {
            height: 50px;
            width: 20rem; /* Increase the height of the comments */
        }
        button {
            background-color: #7ccff5;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: block; /* Display the button as a block element */
            margin-top: 12px; /* Add margin between comments and the button */
            text-shadow: 0 0 10px greenyellow;
            box-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>

    <h2>Membership Registration and Renewal Form</h2>
    
    <form action="/submit_form" method="post">
        <!-- Personal Information -->
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="firstname" required>

        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="lastname" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required>


        <!-- Membership Information -->
        <label for="membershipType">Membership Type:</label>
        <select id="membershipType" name="membershipType" required>
            <option value="new">New Membership</option>
            <option value="renewal">Renewal</option>
        </select>

        <label for="membershipDuration">Membership Duration:</label>
        <select id="membershipDuration" name="membershipDuration" required>
            <option value="1">1 Year</option>
            <option value="2">2 Years</option>
            <option value="3">3 Years</option>
        </select>

        <!-- Additional Information (Optional) -->
        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4"></textarea>

        <!-- Submit Button -->
        <button type="submit">Submit</button>
    </form>

</body>
</html>
